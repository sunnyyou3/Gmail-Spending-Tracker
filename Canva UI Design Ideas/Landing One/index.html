<!doctype html>
<html lang="en" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Landing</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&amp;family=DM+Sans:wght@400;500&amp;display=swap" rel="stylesheet">
  <style>
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(30px, -20px) scale(1.05); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-25px, 15px) scale(1.08); }
    }
    @keyframes float3 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(15px, 25px) scale(0.95); }
    }
    .orb-1 { animation: float1 8s ease-in-out infinite; }
    .orb-2 { animation: float2 10s ease-in-out infinite; }
    .orb-3 { animation: float3 12s ease-in-out infinite; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.7s ease-out forwards; opacity: 0; }
    .fade-up-d1 { animation-delay: 0.1s; }
    .fade-up-d2 { animation-delay: 0.25s; }
    .fade-up-d3 { animation-delay: 0.4s; }
    .fade-up-d4 { animation-delay: 0.55s; }
    .fade-up-d5 { animation-delay: 0.7s; }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }
    .btn-shimmer {
      background-size: 200% auto;
      animation: shimmer 3s linear infinite;
    }

    .pill-hover {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .pill-hover:hover {
      transform: translateY(-2px);
    }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app-wrapper" class="w-full h-full relative overflow-hidden" style="background-color: #0a0a0f;"><!-- Floating orbs -->
   <div class="orb-1 absolute rounded-full blur-3xl opacity-30" style="width: 340px; height: 340px; top: -5%; right: 10%; background-color: #6d28d9;"></div>
   <div class="orb-2 absolute rounded-full blur-3xl opacity-20" style="width: 280px; height: 280px; bottom: 5%; left: 5%; background-color: #6d28d9;"></div>
   <div class="orb-3 absolute rounded-full blur-3xl opacity-15" style="width: 200px; height: 200px; top: 40%; left: 55%; background-color: #22d3ee;"></div><!-- Subtle grid overlay -->
   <div class="absolute inset-0 opacity-[0.04]" style="background-image: linear-gradient(rgba(255,255,255,.5) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,.5) 1px, transparent 1px); background-size: 60px 60px;"></div><!-- Nav -->
   <header class="relative z-10 flex items-center justify-between px-6 sm:px-10 pt-6 fade-up fade-up-d1">
    <div class="flex items-center gap-2">
     <div id="nav-logo" class="w-8 h-8 rounded-lg flex items-center justify-center" style="background-color: #6d28d9;"><i data-lucide="zap" style="width:18px; height:18px; color: #0a0a0f;"></i>
     </div><span id="nav-brand" class="font-semibold text-lg" style="font-family: Sora, sans-serif; color: #e2e2e8;">Pulse</span>
    </div>
    <nav class="hidden sm:flex items-center gap-6 text-sm" style="font-family: 'DM Sans', sans-serif; color: #8a8a9a;"><a href="#" class="hover:text-white transition-colors">Features</a> <a href="#" class="hover:text-white transition-colors">Pricing</a> <a href="#" class="hover:text-white transition-colors">Docs</a>
    </nav>
   </header><!-- Hero -->
   <main class="relative z-10 flex flex-col items-center justify-center text-center px-6" style="height: calc(100% - 80px);"><!-- Feature pills -->
    <div class="flex flex-wrap justify-center gap-3 mb-8 fade-up fade-up-d2"><span id="pill-1" class="pill-hover inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-medium border" style="font-family: 'DM Sans', sans-serif; background-color: rgba(109, 40, 217, 0.1); border-color: rgba(109, 40, 217, 0.3); color: #c4b5fd;"> <i data-lucide="zap" style="width:12px; height:12px;"></i> <span class="pill-text">Lightning Fast</span> </span> <span id="pill-2" class="pill-hover inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-medium border" style="font-family: 'DM Sans', sans-serif; background-color: rgba(109, 40, 217, 0.1); border-color: rgba(109, 40, 217, 0.3); color: #c4b5fd;"> <i data-lucide="shield" style="width:12px; height:12px;"></i> <span class="pill-text">Secure by Default</span> </span> <span id="pill-3" class="pill-hover inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-medium border" style="font-family: 'DM Sans', sans-serif; background-color: rgba(109, 40, 217, 0.1); border-color: rgba(109, 40, 217, 0.3); color: #c4b5fd;"> <i data-lucide="trending-up" style="width:12px; height:12px;"></i> <span class="pill-text">Built to Scale</span> </span>
    </div><!-- Headline -->
    <h1 id="headline" class="fade-up fade-up-d3 font-bold leading-tight tracking-tight max-w-3xl" style="font-family: Sora, sans-serif; font-size: 3.5rem; color: #e2e2e8;">Ship faster with <span id="headline-accent" style="background: linear-gradient(135deg, #a78bfa, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">Pulse</span></h1><!-- Subtext -->
    <p id="description" class="fade-up fade-up-d4 mt-5 max-w-lg leading-relaxed" style="font-family: 'DM Sans', sans-serif; font-size: 1.1rem; color: #8a8a9a;">The modern developer platform that turns ideas into production-ready apps — no boilerplate, no hassle.</p><!-- CTA -->
    <div class="fade-up fade-up-d5 mt-10 flex items-center gap-4"><button id="cta-btn" class="btn-shimmer group relative inline-flex items-center gap-2 px-7 py-3.5 rounded-full font-semibold text-sm transition-all hover:scale-105 active:scale-95" style="font-family: Sora, sans-serif; background: linear-gradient(135deg, #7c3aed, #6d28d9, #7c3aed, #8b5cf6); color: #0a0a0f;"> <span class="cta-label">Get Started</span> <i data-lucide="arrow-right" style="width:16px; height:16px;" class="transition-transform group-hover:translate-x-0.5"></i> </button> <a href="#" class="inline-flex items-center gap-1.5 text-sm font-medium transition-colors hover:text-white" style="font-family: 'DM Sans', sans-serif; color: #8a8a9a;"> <i data-lucide="play-circle" style="width:16px; height:16px;"></i> Watch demo </a>
    </div><!-- Trust line -->
    <p class="fade-up fade-up-d5 mt-12 text-xs tracking-wider uppercase" style="font-family: 'DM Sans', sans-serif; color: #4a4a5a; animation-delay: 0.85s;">Trusted by 2,000+ teams worldwide</p>
   </main>
  </div>
  <script>
    const defaultConfig = {
      background_color: '#0a0a0f',
      accent_color: '#6d28d9',
      text_color: '#e2e2e8',
      primary_action_color: '#7c3aed',
      secondary_text_color: '#8a8a9a',
      font_family: 'Sora',
      font_size: 16,
      product_name: 'Pulse',
      tagline: 'Ship faster with',
      description: 'The modern developer platform that turns ideas into production-ready apps — no boilerplate, no hassle.',
      cta_text: 'Get Started',
      feature_1: 'Lightning Fast',
      feature_2: 'Secure by Default',
      feature_3: 'Built to Scale'
    };

    async function onConfigChange(config) {
      const c = key => config[key] || defaultConfig[key];

      // Background
      const wrapper = document.getElementById('app-wrapper');
      wrapper.style.backgroundColor = c('background_color');

      // Accent orbs
      document.querySelectorAll('.orb-1, .orb-2').forEach(el => {
        el.style.backgroundColor = c('accent_color');
      });

      // Logo
      document.getElementById('nav-logo').style.backgroundColor = c('accent_color');
      document.querySelector('#nav-logo i').style.color = c('background_color');

      // Text colors
      document.getElementById('nav-brand').style.color = c('text_color');
      document.getElementById('headline').style.color = c('text_color');

      // Accent gradient for headline
      const accentSpan = document.getElementById('headline-accent');
      accentSpan.style.background = `linear-gradient(135deg, ${c('primary_action_color')}, #22d3ee)`;
      accentSpan.style.webkitBackgroundClip = 'text';
      accentSpan.style.webkitTextFillColor = 'transparent';

      // Description
      const desc = document.getElementById('description');
      desc.style.color = c('secondary_text_color');
      desc.textContent = c('description');

      // CTA button
      const btn = document.getElementById('cta-btn');
      const ac = c('primary_action_color');
      btn.style.background = `linear-gradient(135deg, ${ac}, ${c('accent_color')}, ${ac}, ${lightenColor(ac, 20)})`;
      btn.style.color = c('background_color');
      btn.querySelector('.cta-label').textContent = c('cta_text');

      // Product name
      const name = c('product_name');
      document.getElementById('nav-brand').textContent = name;
      document.getElementById('headline').innerHTML = `${c('tagline')} <span id="headline-accent" style="background: linear-gradient(135deg, ${c('primary_action_color')}, #22d3ee); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">${name}</span>`;

      // Pills
      const pills = document.querySelectorAll('.pill-text');
      const pillContainers = [document.getElementById('pill-1'), document.getElementById('pill-2'), document.getElementById('pill-3')];
      const features = [c('feature_1'), c('feature_2'), c('feature_3')];
      pills.forEach((p, i) => p.textContent = features[i]);
      pillContainers.forEach(p => {
        p.style.backgroundColor = hexToRgba(c('accent_color'), 0.1);
        p.style.borderColor = hexToRgba(c('accent_color'), 0.3);
        p.style.color = lightenColor(c('accent_color'), 40);
      });

      // Fonts
      const font = c('font_family');
      const baseSize = c('font_size');
      document.getElementById('nav-brand').style.fontFamily = `${font}, sans-serif`;
      document.getElementById('headline').style.fontFamily = `${font}, sans-serif`;
      document.getElementById('headline').style.fontSize = `${baseSize * 2.2}px`;
      desc.style.fontSize = `${baseSize * 1.1}px`;
      btn.style.fontFamily = `${font}, sans-serif`;

      // Secondary text color for nav
      document.querySelectorAll('nav a').forEach(a => a.style.color = c('secondary_text_color'));
    }

    function hexToRgba(hex, alpha) {
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      return `rgba(${r},${g},${b},${alpha})`;
    }

    function lightenColor(hex, percent) {
      const num = parseInt(hex.replace('#', ''), 16);
      const amt = Math.round(2.55 * percent);
      const R = Math.min(255, (num >> 16) + amt);
      const G = Math.min(255, ((num >> 8) & 0x00FF) + amt);
      const B = Math.min(255, (num & 0x0000FF) + amt);
      return `#${(1 << 24 | R << 16 | G << 8 | B).toString(16).slice(1)}`;
    }

    window.elementSdk.init({
      defaultConfig,
      onConfigChange,
      mapToCapabilities: (config) => ({
        recolorables: [
          { get: () => config.background_color || defaultConfig.background_color, set: (v) => { config.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
          { get: () => config.accent_color || defaultConfig.accent_color, set: (v) => { config.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
          { get: () => config.text_color || defaultConfig.text_color, set: (v) => { config.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
          { get: () => config.primary_action_color || defaultConfig.primary_action_color, set: (v) => { config.primary_action_color = v; window.elementSdk.setConfig({ primary_action_color: v }); } },
          { get: () => config.secondary_text_color || defaultConfig.secondary_text_color, set: (v) => { config.secondary_text_color = v; window.elementSdk.setConfig({ secondary_text_color: v }); } }
        ],
        borderables: [],
        fontEditable: {
          get: () => config.font_family || defaultConfig.font_family,
          set: (v) => { config.font_family = v; window.elementSdk.setConfig({ font_family: v }); }
        },
        fontSizeable: {
          get: () => config.font_size || defaultConfig.font_size,
          set: (v) => { config.font_size = v; window.elementSdk.setConfig({ font_size: v }); }
        }
      }),
      mapToEditPanelValues: (config) => new Map([
        ['product_name', config.product_name || defaultConfig.product_name],
        ['tagline', config.tagline || defaultConfig.tagline],
        ['description', config.description || defaultConfig.description],
        ['cta_text', config.cta_text || defaultConfig.cta_text],
        ['feature_1', config.feature_1 || defaultConfig.feature_1],
        ['feature_2', config.feature_2 || defaultConfig.feature_2],
        ['feature_3', config.feature_3 || defaultConfig.feature_3]
      ])
    });

    lucide.createIcons();
  </script>
